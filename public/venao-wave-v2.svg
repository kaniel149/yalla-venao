<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
<defs>
  <style>
    @keyframes waveFront {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-80px); }
    }
    @keyframes waveBack {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-120px); }
    }
    @keyframes waveDeep {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-60px); }
    }
    @keyframes scooterFloat {
      0%,100% { transform: translateY(0) rotate(-1.5deg); }
      25%     { transform: translateY(-9px) rotate(0.5deg); }
      75%     { transform: translateY(-4px) rotate(-2.5deg); }
    }
    @keyframes wheelSpin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes sunGlow {
      0%,100% { filter: drop-shadow(0 0 12px #FCD34D); }
      50%     { filter: drop-shadow(0 0 28px #FBBF24); }
    }
    @keyframes cloudFloat1 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(25px); }
    }
    @keyframes cloudFloat2 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-18px); }
    }
    @keyframes foamPop {
      0%,100% { opacity: 0.55; transform: scaleX(1)   scaleY(1); }
      50%     { opacity: 0.9;  transform: scaleX(1.1) scaleY(1.3); }
    }
    @keyframes spray {
      0%   { opacity: 0;   transform: translateY(0) scale(0.3); }
      30%  { opacity: 0.9; transform: translateY(-14px) scale(1); }
      100% { opacity: 0;   transform: translateY(-28px) scale(0.5); }
    }
    @keyframes palmSway {
      0%,100% { transform-origin: bottom center; transform: rotate(-2deg); }
      50%     { transform-origin: bottom center; transform: rotate(3deg); }
    }
    @keyframes tagFloat {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-4px); }
    }
  </style>

  <!-- Sky gradient -->
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#0EA5E9"/>
    <stop offset="55%"  stop-color="#7DD3FC"/>
    <stop offset="100%" stop-color="#BAE6FD"/>
  </linearGradient>

  <!-- Deep ocean -->
  <linearGradient id="deepOcean" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#0369A1"/>
    <stop offset="100%" stop-color="#082F49"/>
  </linearGradient>

  <!-- Mid wave -->
  <linearGradient id="midWave" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#38BDF8"/>
    <stop offset="100%" stop-color="#0284C7"/>
  </linearGradient>

  <!-- Front wave -->
  <linearGradient id="frontWave" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#7DD3FC"/>
    <stop offset="40%"  stop-color="#38BDF8"/>
    <stop offset="100%" stop-color="#0EA5E9"/>
  </linearGradient>

  <!-- Scooter body gradient -->
  <linearGradient id="scooterGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#FB923C"/>
    <stop offset="100%" stop-color="#EA580C"/>
  </linearGradient>

  <!-- Box gradient -->
  <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#2563EB"/>
    <stop offset="100%" stop-color="#1E40AF"/>
  </linearGradient>

  <!-- Sand gradient -->
  <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#FDE68A"/>
    <stop offset="100%" stop-color="#D97706"/>
  </linearGradient>

  <!-- Glow filter -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <filter id="softShadow">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
  </filter>
  <filter id="waveGlow">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>

  <!-- Wave tile for front (seamless repeat) -->
  <path id="waveTileFront"
    d="M0,0 C30,-22 70,-22 100,-2 C130,18 170,20 200,0 C230,-20 270,-20 300,-2 C330,18 370,20 400,0 C430,-20 470,-20 500,-2 C530,18 570,20 600,0 L600,120 L0,120 Z"/>
  <path id="waveTileMid"
    d="M0,0 C40,-18 80,-18 120,-4 C160,10 200,14 240,0 C280,-14 320,-14 360,-4 C400,6 440,12 480,0 C520,-12 560,-12 600,-4 L600,120 L0,120 Z"/>
</defs>

<!-- ─── SKY ──────────────────────────────────────────────────── -->
<rect width="500" height="500" fill="url(#sky)"/>

<!-- ─── SUN ──────────────────────────────────────────────────── -->
<g style="animation: sunGlow 4s ease-in-out infinite;">
  <circle cx="400" cy="82" r="44" fill="#FCD34D" opacity="0.95"/>
  <circle cx="400" cy="82" r="36" fill="#FDE68A"/>
</g>
<!-- Sun rays -->
<g opacity="0.35" transform="translate(400,82)">
  <line x1="0" y1="-58" x2="0" y2="-48"  stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="0" y1="48"  x2="0" y2="58"   stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="-58" y1="0" x2="-48" y2="0"  stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48"  y1="0" x2="58"  y2="0"  stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="-41" y1="-41" x2="-34" y2="-34" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  <line x1="34"  y1="-34" x2="41" y2="-41" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  <line x1="-41" y1="41"  x2="-34" y2="34" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
  <line x1="34"  y1="34"  x2="41" y2="41"  stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
</g>

<!-- ─── CLOUDS ─────────────────────────────────────────────────── -->
<g style="animation: cloudFloat1 9s ease-in-out infinite alternate;">
  <ellipse cx="90"  cy="72"  rx="48" ry="18" fill="white" opacity="0.9"/>
  <ellipse cx="66"  cy="80"  rx="30" ry="15" fill="white" opacity="0.9"/>
  <ellipse cx="118" cy="80"  rx="30" ry="15" fill="white" opacity="0.9"/>
</g>
<g style="animation: cloudFloat2 13s ease-in-out infinite alternate;">
  <ellipse cx="240" cy="52"  rx="38" ry="14" fill="white" opacity="0.7"/>
  <ellipse cx="218" cy="58"  rx="24" ry="12" fill="white" opacity="0.7"/>
  <ellipse cx="264" cy="58"  rx="24" ry="12" fill="white" opacity="0.7"/>
</g>
<g style="animation: cloudFloat1 16s ease-in-out infinite alternate-reverse;" opacity="0.5">
  <ellipse cx="350" cy="130" rx="32" ry="12" fill="white"/>
  <ellipse cx="330" cy="136" rx="20" ry="10" fill="white"/>
  <ellipse cx="372" cy="136" rx="20" ry="10" fill="white"/>
</g>

<!-- ─── BEACH / SAND ──────────────────────────────────────────── -->
<ellipse cx="250" cy="490" rx="340" ry="60" fill="url(#sand)" opacity="0.8"/>

<!-- Palm tree (left) -->
<g style="animation: palmSway 4s ease-in-out infinite;">
  <line x1="52" y1="460" x2="62" y2="330" stroke="#92400E" stroke-width="7" stroke-linecap="round"/>
  <!-- Fronds -->
  <path d="M62,330 Q22,305 10,280" stroke="#16A34A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M62,330 Q80,290 100,285" stroke="#16A34A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M62,330 Q50,300 38,295" stroke="#15803D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M62,330 Q72,308 88,315" stroke="#15803D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M62,330 Q42,320 28,330" stroke="#166534" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Coconuts -->
  <circle cx="58" cy="335" r="6" fill="#92400E"/>
  <circle cx="68" cy="338" r="5" fill="#92400E"/>
</g>

<!-- Palm tree (right) -->
<g style="animation: palmSway 5s ease-in-out infinite reverse;" transform="translate(440,0)">
  <line x1="0" y1="470" x2="-6" y2="345" stroke="#92400E" stroke-width="6" stroke-linecap="round"/>
  <path d="M-6,345 Q-44,322 -58,298" stroke="#16A34A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M-6,345 Q18,308 35,310" stroke="#16A34A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M-6,345 Q-14,316 -28,310" stroke="#15803D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M-6,345 Q10,322 22,332" stroke="#15803D" stroke-width="3" fill="none" stroke-linecap="round"/>
</g>

<!-- ─── DEEP WAVE (back) ───────────────────────────────────────── -->
<g style="animation: waveDeep 6s linear infinite;" filter="url(#softShadow)">
  <use href="#waveTileMid" transform="translate(0,290)" fill="url(#deepOcean)" opacity="0.8"/>
  <use href="#waveTileMid" transform="translate(600,290)" fill="url(#deepOcean)" opacity="0.8"/>
</g>

<!-- ─── MID WAVE ──────────────────────────────────────────────── -->
<g style="animation: waveBack 5s linear infinite;">
  <use href="#waveTileMid" transform="translate(0,315)" fill="url(#midWave)"/>
  <use href="#waveTileMid" transform="translate(600,315)" fill="url(#midWave)"/>
</g>

<!-- ─── FRONT WAVE ────────────────────────────────────────────── -->
<g style="animation: waveFront 3.5s linear infinite;" filter="url(#waveGlow)">
  <use href="#waveTileFront" transform="translate(0,330)" fill="url(#frontWave)"/>
  <use href="#waveTileFront" transform="translate(500,330)" fill="url(#frontWave)"/>
</g>

<!-- Foam line on front wave crest -->
<g style="animation: waveFront 3.5s linear infinite;">
  <ellipse cx="250" cy="330" rx="130" ry="7" fill="white" opacity="0.75"
           style="animation: foamPop 1.8s ease-in-out infinite;"/>
  <ellipse cx="90"  cy="334" rx="55"  ry="5" fill="white" opacity="0.5"
           style="animation: foamPop 2.1s ease-in-out infinite;"/>
  <ellipse cx="430" cy="328" rx="55"  ry="5" fill="white" opacity="0.5"
           style="animation: foamPop 1.6s ease-in-out infinite;"/>
</g>

<!-- Spray particles -->
<g style="animation: spray 1.4s ease-out infinite;">
  <circle cx="210" cy="325" r="3" fill="white" opacity="0.8"/>
  <circle cx="225" cy="320" r="2" fill="white" opacity="0.6"/>
  <circle cx="240" cy="322" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="255" cy="318" r="2" fill="white" opacity="0.6"/>
  <circle cx="268" cy="324" r="3" fill="white" opacity="0.8"/>
</g>
<g style="animation: spray 1.9s ease-out infinite 0.4s;">
  <circle cx="175" cy="332" r="2" fill="white" opacity="0.6"/>
  <circle cx="188" cy="328" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="300" cy="326" r="2" fill="white" opacity="0.6"/>
  <circle cx="316" cy="330" r="2.5" fill="white" opacity="0.7"/>
</g>

<!-- ─── SCOOTER (riding the front wave) ─────────────────────────── -->
<g style="animation: scooterFloat 1.6s ease-in-out infinite; transform-origin: 252px 312px;"
   filter="url(#softShadow)">

  <!-- Shadow below scooter -->
  <ellipse cx="252" cy="338" rx="55" ry="6" fill="#0369A1" opacity="0.25"/>

  <!-- Scooter platform/base -->
  <rect x="190" y="318" width="124" height="14" rx="7" fill="url(#scooterGrad)"/>

  <!-- Body main -->
  <path d="M198,318 Q200,295 218,292 L288,292 Q306,295 308,318 Z" fill="url(#scooterGrad)"/>

  <!-- Body accent stripe -->
  <path d="M210,318 Q212,302 222,300 L282,300 Q292,302 294,318 Z" fill="#FB923C" opacity="0.5"/>

  <!-- Windshield -->
  <path d="M210,310 Q214,288 232,284 L252,284 L260,310 Z" 
        fill="#BAE6FD" opacity="0.75" stroke="white" stroke-width="0.5"/>

  <!-- Headlight -->
  <ellipse cx="200" cy="310" rx="7" ry="5" fill="#FDE68A" opacity="0.9"/>
  <ellipse cx="200" cy="310" rx="4" ry="3" fill="white" opacity="0.8"/>

  <!-- Front wheel -->
  <circle cx="194" cy="330" r="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <circle cx="194" cy="330" r="8"  fill="#475569"/>
  <circle cx="194" cy="330" r="3"  fill="#94A3B8"/>
  <g style="animation: wheelSpin 0.5s linear infinite; transform-origin: 194px 330px;">
    <line x1="194" y1="320" x2="194" y2="322" stroke="#64748B" stroke-width="1.5"/>
    <line x1="194" y1="338" x2="194" y2="340" stroke="#64748B" stroke-width="1.5"/>
    <line x1="184" y1="330" x2="186" y2="330" stroke="#64748B" stroke-width="1.5"/>
    <line x1="202" y1="330" x2="204" y2="330" stroke="#64748B" stroke-width="1.5"/>
  </g>

  <!-- Rear wheel -->
  <circle cx="310" cy="330" r="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <circle cx="310" cy="330" r="8"  fill="#475569"/>
  <circle cx="310" cy="330" r="3"  fill="#94A3B8"/>
  <g style="animation: wheelSpin 0.5s linear infinite; transform-origin: 310px 330px;">
    <line x1="310" y1="320" x2="310" y2="322" stroke="#64748B" stroke-width="1.5"/>
    <line x1="310" y1="338" x2="310" y2="340" stroke="#64748B" stroke-width="1.5"/>
    <line x1="300" y1="330" x2="302" y2="330" stroke="#64748B" stroke-width="1.5"/>
    <line x1="318" y1="330" x2="320" y2="330" stroke="#64748B" stroke-width="1.5"/>
  </g>

  <!-- Handlebar -->
  <rect x="204" y="297" width="18" height="3" rx="1.5" fill="#0F172A"/>
  <rect x="204" y="294" width="3"  height="9" rx="1.5" fill="#0F172A"/>
  <rect x="219" y="294" width="3"  height="9" rx="1.5" fill="#0F172A"/>

  <!-- Delivery box -->
  <rect x="274" y="285" width="42" height="34" rx="5" fill="url(#boxGrad)" stroke="#1D4ED8" stroke-width="0.5"/>
  <rect x="278" y="289" width="34" height="22" rx="3" fill="#1E40AF"/>
  <!-- Y logo on box -->
  <text x="295" y="306" font-family="Georgia,serif" font-size="14" font-weight="900"
        fill="white" text-anchor="middle">Y</text>
  <!-- Box handle -->
  <path d="M286,285 Q295,278 304,285" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Rider body -->
  <ellipse cx="248" cy="292" rx="16" ry="10" fill="#475569"/>
  <!-- Jacket -->
  <path d="M234,294 Q236,308 248,310 Q260,308 262,294 Z" fill="#0F172A"/>
  <!-- Arms -->
  <path d="M236,298 Q222,302 212,300" stroke="#475569" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M260,298 Q266,296 270,294" stroke="#475569" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Helmet -->
  <circle cx="248" cy="282" r="15" fill="#0F172A"/>
  <path d="M235,282 Q240,267 248,265 Q256,267 261,282 Z" fill="#1E293B"/>
  <!-- Helmet visor -->
  <path d="M237,284 Q248,278 259,284" stroke="#38BDF8" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Speed lines -->
  <line x1="140" y1="308" x2="175" y2="308" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="133" y1="316" x2="172" y2="316" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.6"/>
  <line x1="137" y1="324" x2="173" y2="324" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="143" y1="332" x2="174" y2="332" stroke="white" stroke-width="1"   stroke-linecap="round" opacity="0.3"/>

</g>

<!-- ─── BRANDING TAG ──────────────────────────────────────────── -->
<g style="animation: tagFloat 3s ease-in-out infinite;">
  <rect x="154" y="418" width="192" height="44" rx="22" 
        fill="#0F172A" opacity="0.88"/>
  <rect x="156" y="420" width="188" height="40" rx="20" 
        fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.4"/>
  <text x="250" y="446" font-family="'Segoe UI',Arial,sans-serif" font-size="15"
        font-weight="800" fill="white" text-anchor="middle" letter-spacing="3">
    YALLA VENAO
  </text>
</g>

<!-- Water shimmer highlights -->
<ellipse cx="130" cy="365" rx="30" ry="4" fill="white" opacity="0.12" transform="rotate(-8,130,365)"/>
<ellipse cx="380" cy="375" rx="22" ry="3" fill="white" opacity="0.10" transform="rotate(5,380,375)"/>
<ellipse cx="290" cy="355" rx="18" ry="3" fill="white" opacity="0.08"/>
<ellipse cx="80"  cy="380" rx="14" ry="2" fill="white" opacity="0.12" transform="rotate(-4,80,380)"/>

</svg>
